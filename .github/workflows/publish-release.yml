name: Publish Sapi Release

on:
  push:
    branches:
      - main
    paths:
      - 'V*/Install/**'
      - 'V*/Documentation/sapi.html'
      - 'docs/index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish_release.sh
