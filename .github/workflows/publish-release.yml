name: Publish Sapi Release

on:
  push:
    branches:
      - main
    paths:
      - 'V*/Install/windows/**'
      - 'V*/Install/plugin/**'
      - 'V*/Install/linux/**'
      - 'V*/Documentation/sapi.html'
      - 'docs/index.html'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (SemVer, e.g. 1.3.6). Optional.'
        required: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: bash .github/scripts/publish_release.sh
